<!doctype html>
<html lang="zh-TW">
  <head>
    <script>try{performance.mark('noureon:navigation-start')}catch{}</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="description" content="Noureon is a multi-provider AI workspace with reusable Nouras, model collaboration, image generation, and cloud sync." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Noureon" />
    <meta property="og:description" content="A multi-provider AI workspace with reusable Nouras, model collaboration, image generation, and cloud sync." />
    <meta property="og:url" content="https://noureon.com/" />
    <meta property="og:image" content="https://noureon.com/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Noureon" />
    <meta name="twitter:description" content="A multi-provider AI workspace with reusable Nouras, model collaboration, image generation, and cloud sync." />
    <link rel="canonical" href="https://noureon.com/" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <style>
      [data-startup-skeleton] {
        position: fixed;
        inset: 0;
        z-index: 9999;
        box-sizing: border-box;
        display: grid;
        place-items: center;
        padding: 1.5rem;
        background: #ffffff;
        color: #17151f;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .startup-skeleton__panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.625rem;
        text-align: center;
      }

      .startup-skeleton__spinner {
        width: 9.5rem;
        height: 9.5rem;
        animation: startup-skeleton-spin 2.15s linear infinite;
        will-change: transform;
      }

      .startup-skeleton__logo {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .startup-skeleton__copy {
        display: grid;
        justify-items: center;
        gap: 0.5rem;
      }

      .startup-skeleton__title,
      .startup-skeleton__message {
        margin: 0;
      }

      .startup-skeleton__title {
        font-size: 0.875rem;
        font-weight: 650;
        letter-spacing: 0.06em;
      }

      .startup-skeleton__message {
        min-width: 13em;
        color: #8c8792;
        font-size: 0.75rem;
      }

      .startup-skeleton__message-label {
        position: relative;
        display: inline-block;
      }

      .startup-skeleton__dots {
        position: absolute;
        top: 0;
        left: 100%;
        white-space: nowrap;
      }

      .startup-skeleton__dots span {
        animation: startup-skeleton-dot 1.35s infinite both;
      }

      .startup-skeleton__dots span:nth-child(2) {
        animation-delay: 180ms;
      }

      .startup-skeleton__dots span:nth-child(3) {
        animation-delay: 360ms;
      }

      @keyframes startup-skeleton-spin {
        to { transform: rotate(360deg); }
      }

      @keyframes startup-skeleton-dot {
        0%, 60%, 100% { opacity: 0.2; }
        30% { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .startup-skeleton__spinner,
        .startup-skeleton__dots span {
          animation: none;
        }
      }
    </style>
    <title>Noureon</title>
  </head>
  <body class="font-sans bg-gray-50">
    <div id="app">
      <main data-startup-skeleton aria-labelledby="startup-skeleton-title">
        <div class="startup-skeleton__panel" role="status" aria-live="polite" aria-atomic="true" aria-busy="true">
          <div class="startup-skeleton__spinner" aria-hidden="true">
            <img class="startup-skeleton__logo" src="/logo.png" alt="" width="152" height="152" fetchpriority="high" />
          </div>
          <div class="startup-skeleton__copy">
            <h1 id="startup-skeleton-title" class="startup-skeleton__title">正在準備工作空間</h1>
            <p class="startup-skeleton__message"><span class="startup-skeleton__message-label">請稍候<span class="startup-skeleton__dots"><span>．</span><span>．</span><span>．</span></span></span></p>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
